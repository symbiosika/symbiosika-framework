name: Generate DB Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main        

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Generate DB Docs
        run: bun run .scripts/generate-db-doc.ts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-schema-doc
          path: docs/11_BuildIn_DB_Schema.md
      - name: Commit documentation
        run: |
          if [ -n "$(git status --porcelain docs/11_BuildIn_DB_Schema.md)" ]; then
            git config user.name "${{ github.actor }}"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            git add docs/11_BuildIn_DB_Schema.md
            git commit -m "chore: update db schema docs"
            git push
          fi
