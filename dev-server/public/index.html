<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirect</title>
    <script>
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(";").shift();
        return null;
      }
      // The `jwt` cookie is HttpOnly; we use the non-HttpOnly `jwt_present`
      // marker the backend sets alongside it to detect a logged-in state.
      const jwtMarker = getCookie("jwt_present");
      if (jwtMarker) {
        (async () => {
          try {
            const u = await fetch("/api/v1/user/me");
            if (u.status === 200) {
              window.location.href = "/static/app/";
            } else {
              window.location.href = "/manage/";
            }
          } catch (error) {
            console.error(error);
          }
        })();
      } else {
        window.location.href = "/manage/";
      }
    </script>
  </head>
  <body></body>
</html>
