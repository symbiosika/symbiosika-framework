# Start the local development database and environment
# This will NOT contain the webserver or any other services

services:
  postgres_db:
    image: pgvector/pgvector:pg17
    container_name: kinautwebserver_postgres_test
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "5432:5432"
    volumes:
      - pg_data_kinautwebserver:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: no

  pgadmin:
    image: dpage/pgadmin4
    container_name: kinautwebserver_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@symbiosika.de"
      PGADMIN_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    restart: no

volumes:
  pg_data_kinautwebserver:
    driver: local
